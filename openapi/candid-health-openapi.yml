      title: PatientNonInsurancePayerInfoCreate
    type_individual:PatientCreate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        gender:
          $ref: '#/components/schemas/type_individual:Gender'
        external_id:
          type: string
          description: >-
            The ID used to identify this individual in your system. For example, your internal patient ID or an EHR
            patient ID.
        date_of_birth:
          type: string
          format: date
          description: >-
            Box 3 on the CMS-1500 claim form or Form Locator 10 on a UB-04 claim form. The date format should be in ISO
            8601 date; formatted YYYY-MM-DD (i.e. 2012-02-01)
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressShortZip'
          description: Box 5 on the CMS-1500 claim form or Form Locator 9 on a UB-04 claim form.
        phone_numbers:
          type: array
          items:
            $ref: '#/components/schemas/type_commons:PhoneNumber'
        phone_consent:
          type: boolean
          description: Defaults to false
        email:
          $ref: '#/components/schemas/type_commons:Email'
        non_insurance_payers:
          type: array
          items:
            $ref: '#/components/schemas/type_non-insurance-payers/v1:NonInsurancePayerId'
        non_insurance_payers_info:
          type: array
          items:
            $ref: '#/components/schemas/type_individual:PatientNonInsurancePayerInfoCreate'
        email_consent:
          type: boolean
          description: Defaults to false
        auto_charge_consent:
          type: boolean
          description: Defaults to false
      required:
        - first_name
        - last_name
        - gender
        - external_id
        - date_of_birth
        - address
      title: PatientCreate
    type_encounter-providers/v2:TreatingProvider:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        npi:
          type: string
          description: |-
            A National Provider Identifier is a unique 10-digit identification
            number issued to health care providers in the United States
        taxonomy_code:
          type: string
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
        license_type:
          $ref: '#/components/schemas/type_organization-providers/v2:LicenseType'
          description: The license type of the treating provider (e.g., MD, NP, PA, LCSW).
      required:
        - first_name
        - last_name
      description: >-
        The treating provider for professional encounters. Unlike other provider types, the treating provider has an
        optional NPI and no organization_name field.
      title: TreatingProvider
    type_service-facility:EncounterServiceFacilityBase:
      type: object
      properties:
        organization_name:
          type: string
        npi:
          type: string
          description: >-
            An NPI specific to the service facility if applicable, i.e. if it has one and is not under the billing
            provider's NPI.

            Box 32 section (a) of the CMS-1500 claim form.
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
          description: >-
            zip_plus_four_code is required for service facility address. When the zip_plus_four_code is not available
            use "9998" as per CMS documentation.
        secondary_identification:
          type: string
          description: >-
            An additional identifier for the service facility other than the facility's NPI. Some payers may require
            this field.

            Potential examples: state license number, provider commercial number, or location number.

            Box 32 section (b) of the CMS-1500 claim form.
        mammography_certification_number:
          type: string
          description: >-
            The associated mammography certification number for this service facility. This is a 6 digit code assigned
            by the FDA.
      required:
        - organization_name
        - address
      description: >-
        Encounter Service facility is typically the location a medical service was rendered, such as a provider office
        or hospital.

        For telehealth, service facility can represent the provider's location when the service was delivered (e.g.,
        home),

        or the location where an in-person visit would have taken place, whichever is easier to identify.

        If the provider is in-network, service facility may be defined in payer contracts.

        Box 32 on the CMS-1500 claim form.

        Note that for an in-network claim to be successfully adjudicated, the service facility address listed on claims

        must match what was provided to the payer during the credentialing process.
      title: EncounterServiceFacilityBase
    type_insurance-cards/v2:InsuranceCardCreate:
