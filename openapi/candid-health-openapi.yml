components:
  schemas:
    type_pre-encounter/eligibilityChecks/v1:IndividualProvider:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        npi:
          type: string
      required:
        - npi
      title: IndividualProvider
    type_pre-encounter/eligibilityChecks/v1:OrganizationProvider:
      type: object
      properties:
        organization_name:
          type: string
        npi:
          type: string
      required:
        - npi
      title: OrganizationProvider
    type_pre-encounter/eligibilityChecks/v1:Provider:
      oneOf:
        - $ref: '#/components/schemas/type_pre-encounter/eligibilityChecks/v1:IndividualProvider'
        - $ref: '#/components/schemas/type_pre-encounter/eligibilityChecks/v1:OrganizationProvider'
      title: Provider
    type_pre-encounter/coverages/v1:MemberInfo:
      type: object
      properties:
        member_id:
          type: string
          description: >-
            Stedi requires that you supply at least one of these fields in the request: memberId, dateOfBirth, or
            lastName.  

            However, each payer has different requirements, so you should supply as many of the fields necessary for
            each payer 

            to identify the subscriber/dependent in their system.
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
          description: >-
            Stedi requires that you supply at least one of these fields in the request: memberId, dateOfBirth, or
            lastName.  

            However, each payer has different requirements, so you should supply as many of the fields necessary for
            each payer 

            to identify the subscriber/dependent in their system.
      required:
        - first_name
        - last_name
      title: MemberInfo
    type_pre-encounter/eligibilityChecks/v1:Encounter:
      type: object
      properties:
        date_of_service:
          type: string
          format: date
          description: Defaults to the current date if not provided.
        service_type_codes:
          type: array
          items:
            type: string
          description: >-
            Defaults to HealthBenefitPlanCoverage (30) if not provided.

            <Note>Not all payers support multiple service type codes, so it is recommended to only include a single code
            per request.</Note>
      title: Encounter
    type_pre-encounter/eligibilityChecks/v1:EligibilityRequest:
      type: object
      properties:
        submitter_transaction_identifier:
          type: string
          description: >-
            A unique identifier for the eligibility check within the batch. Candid returns this identifier in the
            response for the

            /batch/{batch_id} polling endpoint so you can correlate benefit responses with the original eligibility
            check.
        payer_id:
          type: string
          description: Supported payer ID values can be found [here](https://www.stedi.com/healthcare/network).
        provider:
          $ref: '#/components/schemas/type_pre-encounter/eligibilityChecks/v1:Provider'
        subscriber:
          $ref: '#/components/schemas/type_pre-encounter/coverages/v1:MemberInfo'
          description: >-
            The primary policyholder for the insurance plan or a dependent with a unique member ID. <Note>If a dependent
            has a unique member ID, include their information here and leave dependent undefined.</Note>
        dependent:
          $ref: '#/components/schemas/type_pre-encounter/coverages/v1:MemberInfo'
          description: >-
            <Note>If a dependent has a unique member ID, include their information as subscriber and leave this field
            undefined.</Note>
        encounter:
          $ref: '#/components/schemas/type_pre-encounter/eligibilityChecks/v1:Encounter'
        get_existing_check_initiated_after:
          type: string
          format: date-time
          description: >-
            If not provided, this endpoint will run a fresh eligibility check. If provided, it will return an existing
            successful eligibility check if one exists that was initiated after provided date with the same parameters
            (Date of Service, Payer ID, Provider, Subscriber, Dependent, and Encounter).
        source:
          type: string
        portal_password:
          type: string
          description: The password that the provider uses to log in to the payer's portal. This is not commonly used.
        portal_username:
          type: string
          description: The username that the provider uses to log in to the payer's portal. This is not commonly used.
      required:
        - payer_id
        - provider
        - subscriber
      description: An object representing the data for an eligibility request.
      title: EligibilityRequest
    type_pre-encounter/eligibilityChecks/v1:EligibilityCheckErrorSource:
      type: string
      enum:
        - CANDID
        - STEDI
      description: enum to represent the source of an error in an eligibility check
      title: EligibilityCheckErrorSource
    type_pre-encounter/eligibilityChecks/v1:EligibilityCheckErrorDetails:
      type: object
      properties:
        field?:
          type: string
        description?:
          type: string
        location?:
          type: string
        possibleResolutions?:
          type: string
        code?:
          type: string
        followupAction?:
          type: string
      description: This object is our fern representation of Stedi's EligbilityCheckError object from their API.
      title: EligibilityCheckErrorDetails
    type_pre-encounter/eligibilityChecks/v1:EligibilityCheckError:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/type_pre-encounter/eligibilityChecks/v1:EligibilityCheckErrorSource'
        errorDetails:
          $ref: '#/components/schemas/type_pre-encounter/eligibilityChecks/v1:EligibilityCheckErrorDetails'
      required:
        - source
        - errorDetails
      title: EligibilityCheckError
    type_pre-encounter/eligibilityChecks/v1:EligibilityStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - UNKNOWN
      description: enum to represent the status of a patient's coverage
      title: EligibilityStatus
