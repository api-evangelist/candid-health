          type: string
          format: date
        patient_external_id:
          $ref: '#/components/schemas/type_commons:PatientExternalId'
        charge_external_id:
          type: string
        ehr_source_url:
          type: string
        originating_system:
          type: string
        claim_creation_category:
          type: string
        metadata:
          type: array
          items:
            $ref: '#/components/schemas/type_custom-schemas/v1:SchemaInstance'
          description: |-
            Key-value pairs that adhere to metadata schemas.
            Multiple metadata instances can be associated with a charge capture.
        error:
          $ref: '#/components/schemas/type_charge-capture/v1:ChargeCaptureError'
        updates:
          type: array
          items:
            $ref: '#/components/schemas/type_charge-capture/v1:ChargeCapturePostBilledChange'
          description: >-
            This list of updates will always return at most 1 update that is not resolved. The singular update will
            contain the difference between the updated charge and the created encounter.
        claim_creation_id:
          $ref: '#/components/schemas/type_commons:ChargeCaptureClaimCreationId'
      required:
        - id
        - status
        - charge_capture_data
        - patient_external_id
        - charge_external_id
        - updates
      title: ChargeCapture
    type_commons:Primitive:
      type: string
      enum:
        - BOOLEAN
        - DOUBLE
        - INTEGER
        - STRING
      description: |-
        The BOOLEAN and STRING primitives respectively map to the `boolean` and `string` JSON data types.
        The DOUBLE and INTEGER primitives must be written as a JSON `number` type.
      title: Primitive
    type_encounters/v4:SchemaInstanceValidationError:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - multiple_instances_for_schema
              description: 'Discriminator value: multiple_instances_for_schema'
            schema_id:
              $ref: '#/components/schemas/type_commons:SchemaId'
          required:
            - type
            - schema_id
        - type: object
          properties:
            type:
              type: string
              enum:
                - value_does_not_match_key_type
              description: 'Discriminator value: value_does_not_match_key_type'
            schema_id:
              $ref: '#/components/schemas/type_commons:SchemaId'
            key:
              type: string
            expected_value_type:
              $ref: '#/components/schemas/type_commons:Primitive'
            value:
              description: Any type
          required:
            - type
            - schema_id
            - key
            - expected_value_type
            - value
        - type: object
          properties:
            type:
              type: string
              enum:
                - key_does_not_exist
              description: 'Discriminator value: key_does_not_exist'
            key:
              type: string
            schema_id:
              $ref: '#/components/schemas/type_commons:SchemaId'
          required:
            - type
            - key
            - schema_id
        - type: object
          properties:
            type:
              type: string
              enum:
                - schema_does_not_exist
              description: 'Discriminator value: schema_does_not_exist'
            schema_id:
              $ref: '#/components/schemas/type_commons:SchemaId'
          required:
            - type
            - schema_id
        - type: object
          properties:
            type:
              type: string
              enum:
                - schema_unauthorized_access
              description: 'Discriminator value: schema_unauthorized_access'
            schema_id:
              $ref: '#/components/schemas/type_commons:SchemaId'
          required:
            - type
            - schema_id
      discriminator:
        propertyName: type
      title: SchemaInstanceValidationError
