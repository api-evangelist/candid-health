  /api/charge_captures/v1/create-from-pre-encounter:
    post:
      operationId: create-from-pre-encounter-patient
      summary: Create a Charge Capture from pre-encounter patient and appointment
      description: >-
        Create a Charge Capture from a pre-encounter patient and appointment. This endpoint is intended to be used by
        consumers who are managing

        patients and appointments in the pre-encounter service and is currently under development. Consumers who are not
        taking advantage

        of the pre-encounter service should use the standard create endpoint.


        At encounter creation time, information from the provided patient and appointment objects will be populated

        where applicable. In particular, the following fields are populated from the patient and appointment objects:
          - Patient
          - Referring Provider
          - Subscriber Primary
          - Subscriber Secondary
          - Referral Number
          - Responsible Party
          - Guarantor

        Note that these fields should not be populated in the ChargeCaptureData property of this endpoint, as they will
        be overwritten at encounter creation time.


        Utilizing this endpoint opts you into automatic updating of the encounter when the patient or appointment is
        updated, assuming the

        encounter has not already been submitted or adjudicated.
      tags:
        - subpackage_charge-capture.subpackage_charge-capture/v1
      parameters:
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_charge-capture/v1:ChargeCapture'
        '403':
          description: Error response with status 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - UnauthorizedError
                  content:
                    $ref: '#/components/schemas/type_commons:UnauthorizedErrorMessage'
                required:
                  - errorName
                  - content
