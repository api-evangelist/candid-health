          format: date-time
        status:
          $ref: '#/components/schemas/type_pre-encounter/appointments/v1:AppointmentStatus'
          description: >-
            Defaults to PENDING. If status is NOT_READY, work_queue must be set. If status is READY or CHECKED_IN,
            work_queue must be null. If status is CHECKED_IN, checked_in_timestamp must be set. If checked_in_timestamp
            is set, status must be CHECKED_IN.
        not_ready_reason:
          $ref: '#/components/schemas/type_pre-encounter/appointments/v1:NotReadyReason'
          description: >-
            The reason the appointment is NOT_READY. Must only be set when status is NOT_READY; it is cleared otherwise.
            MANUAL is the only value that may be set via the API.
        service_duration:
          type: integer
          description: The requested length of time allotted for the appointment. The units are in minutes.
        services:
          type: array
          items:
            $ref: '#/components/schemas/type_pre-encounter/appointments/v1:Service'
        placer_appointment_id:
          type: string
          description: ID for the appointment/order for the event.
        attending_doctor:
          $ref: '#/components/schemas/type_pre-encounter/common:ExternalProvider'
          description: Attending physician information. The attending physician will be stored as the Current MD for the patient.
        estimated_copay_cents:
          type: integer
        estimated_patient_responsibility_cents:
          type: integer
        patient_deposit_cents:
          type: integer
        appointment_details:
          type: string
        checked_in_timestamp:
          type: string
          format: date-time
          description: >-
            The timestamp when the patient checked in for their appointment. If status is CHECKED_IN,
            checked_in_timestamp must be set. If checked_in_timestamp is set, status must be CHECKED_IN.
        notes:
          type: string
        location_resource_id:
          type: string
          description: 'Contains the coded identification of the location being scheduled. Components: <Identifier (ST)>^<Text (ST)>'
        automated_eligibility_check_complete:
          type: boolean
          description: >-
            True if the automated eligibility check has been completed. It is not recommended to change this value
            manually via API. This refers explicitly to the automated eligibility check that occurs a specific number of
            days before the appointment.
        work_queue:
          $ref: '#/components/schemas/type_pre-encounter/appointments/v1:AppointmentWorkQueue'
          description: >-
            The work queue that the appointment belongs to. It is not recommended to change this value manually via API.
            If status is NOT_READY, work_queue must be set. If status is READY, work_queue must be null.
        id:
          $ref: '#/components/schemas/type_pre-encounter/common:AppointmentId'
      required:
        - organization_id
        - deactivated
        - version
        - updated_at
        - updating_user_id
        - patient_id
        - start_timestamp
        - service_duration
        - services
        - id
      description: An appointment object with immutable server-owned properties.
      title: Appointment
