    type_fee-schedules/v3:PayerThreshold:
      type: object
      properties:
        upper_threshold_cents:
          type: integer
        lower_threshold_cents:
          type: integer
        disable_paid_incorrectly:
          type: boolean
      required:
        - disable_paid_incorrectly
      description: >-
        Rate thresholds that determine fee schedule rate matching behavior.  When a service line is adjudicated by a
        payer Candid determines if the payer's

        allowed amount "matches" the rate value.  If the allowed amount doesn't equal the rate value, Candid moves the
        claim to a PAID_INCORRECTLY state.  These

        optional thresholds allow a user to set wiggle room to avoid claims moving to PAID_INCORRECTLY and instead have
        them move directly to FINALIZED_PAID

        when the payer's allowed amount is greater than [rate_cents - lower_threshold_cents] and less than [rate_cents +
        upper_threshold_cents].


        Additionally, a client can set disable_paid_incorrectly to avoid the PAID_INCORRECTLY claim status entirely.
      title: PayerThreshold
    type_fee-schedules/v3:ThresholdMatch:
      type: object
      properties:
        threshold:
          $ref: '#/components/schemas/type_fee-schedules/v3:PayerThreshold'
        rate_cents:
          type: integer
        match:
          type: boolean
        explanation:
          type: string
      required:
        - threshold
        - rate_cents
        - match
        - explanation
      description: Threshold and dollar amount matching for a service line
      title: ThresholdMatch
    type_commons:RateId:
      type: string
      format: uuid
      title: RateId
    type_fee-schedules/v3:MatchResult:
      type: object
      properties:
        threshold:
          $ref: '#/components/schemas/type_fee-schedules/v3:ThresholdMatch'
        rate_id:
