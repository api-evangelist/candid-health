      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/type_encounter-attachments/v1:EncounterAttachment'
    put:
      operationId: create
      summary: Create Encounter Attachment
      description: |-
        Uploads a file to the encounter. The file will be stored in the
        encounter's attachments. Deprecated: Use create-v2 instead.
      tags:
        - subpackage_encounter-attachments.subpackage_encounter-attachments/v1
      parameters:
        - name: encounter_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/type_commons:EncounterId'
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_encounter-attachments/v1:AttachmentId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                attachment_file:
                  type: string
                  format: binary
                  description: |-
