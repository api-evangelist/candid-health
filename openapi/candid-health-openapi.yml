          schema:
            type: string
        - name: service_facility_name
          in: query
          description: >-
            A string to filter by. This will return all charge capture claim_creations which include one or more charges
            with this service facility name.
          required: false
          schema:
            type: string
        - name: primary_payer_ids
          in: query
          description: >-
            A list of primary payer IDs to filter by. This will return all charge capture claim_creations which include
