        message:
          type: string
        resolved:
          type: boolean
      required:
        - id
        - message
        - resolved
      description: >-
        ChargeCapturePostBilledChange represents a change to a ChargeCapture that occurred after the ChargeCapture's
        status moved to BILLED. Action must be taken to resolve the update, and then the update should be marked as
        resolved.
      title: ChargeCapturePostBilledChange
    type_charge-capture/v1:ChargeCapture:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/type_commons:ChargeCaptureId'
