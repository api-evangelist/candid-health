              description: 'Discriminator value: new_version'
            rate_id:
              $ref: '#/components/schemas/type_commons:RateId'
            previous_version:
              type: integer
              description: >-
                New versions of rates must indicate the exact version they modify. When the system attempts to save this
                new version, if the latest version in the system does not equal this previos_version, the request will
                be rejected with a EntityConflictError.
            entries:
              type: array
              items:
                $ref: '#/components/schemas/type_fee-schedules/v3:RateEntry'
          required:
