          in: path
          required: true
          schema:
            $ref: '#/components/schemas/type_commons:EncounterId'
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                attachment_id:
                  $ref: '#/components/schemas/type_encounter-attachments/v1:AttachmentId'
              required:
                - attachment_id
