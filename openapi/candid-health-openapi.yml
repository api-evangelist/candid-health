          $ref: '#/components/schemas/type_pre-encounter/appointments/v1:NotReadyReason'
          description: >-
            The reason the appointment is NOT_READY. Must only be set when status is NOT_READY; it is cleared otherwise.
            MANUAL is the only value that may be set via the API.
        service_duration:
          type: integer
          description: The requested length of time allotted for the appointment. The units are in minutes.
        services:
          type: array
          items:
            $ref: '#/components/schemas/type_pre-encounter/appointments/v1:Service'
