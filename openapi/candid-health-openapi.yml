    type_charge-capture/v1:Hl7MessageType:
      type: string
      enum:
        - BAR
        - DFT
        - ADT
      description: >-
        HL7 message type that produced a charge-capture write. Values match the bare MSH-9-1 code emitted by HL7
        producers (conduit). Constrains the `hl7_message_type` field on charge-capture create/update payloads so that
        whitespace, case drift, or non-canonical values are rejected at the API boundary instead of silently bypassing
        the BAR/DFT discriminator.
      title: Hl7MessageType
