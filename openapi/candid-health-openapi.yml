                date_range_min:
                  type: string
                  format: date
                  description: Minimum (inclusive) date selected for the superbill
                date_range_max:
                  type: string
                  format: date
                  description: Maximum (inclusive) date selected for the superbill
                pay_to_address:
                  $ref: '#/components/schemas/type_commons:StreetAddressShortZip'
                  description: >-
                    Address that will be displayed on the superbill as the 'Pay to' Address. If not provided this value
                    will be set from available encounter data.
                output_format:
                  $ref: '#/components/schemas/type_superbills/v1:SuperbillOutputFormat'
                  description: Output format for the superbill. Defaults to DOCX if not specified.
                include_merged_patient_data:
                  type: boolean
                  description: If true will include claims from any alternative patients the given patient_external_id has.
              required:
                - patient_external_id
                - date_range_min
                - date_range_max
