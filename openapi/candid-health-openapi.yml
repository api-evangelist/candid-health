            number issued to health care providers in the United States
        taxonomy_code:
          type: string
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
        license_type:
          $ref: '#/components/schemas/type_organization-providers/v2:LicenseType'
          description: The license type of the treating provider (e.g., MD, NP, PA, LCSW).
      description: Update type for the treating provider. All fields are optional.
      title: TreatingProviderUpdate
    type_encounter-providers/v2:BillingProviderUpdate:
      type: object
      properties:
        first_name:
          type: string
          description: If the provider is an individual, this should be set instead of organization name
        last_name:
          type: string
          description: If the provider is an individual, this should be set instead of organization name
        organization_name:
          type: string
          description: If the provider is an organization, this should be set instead of first + last name
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
        tax_id:
          type: string
          description: >-
            If the provider has a contract with insurance, this must be the same tax ID given to the payer on an IRS W-9
            form completed during contracting.
        npi:
          type: string
        taxonomy_code:
          type: string
        provider_commercial_license_type:
          $ref: '#/components/schemas/type_commons:BillingProviderCommercialLicenseType'
          description: |-
            837i Loop2010BB G2
            Provider Commercial Number
        secondary_identification:
          $ref: '#/components/schemas/type_encounter-providers/v2:BillingProviderSecondaryIdentification'
          description: |-
            Only one of provider_commercial_license_type or secondary_identification may be provided
            837i Loop2010BB G2
            Secondary Identification
      description: >-
        The billing provider is the provider or business entity submitting the claim.

        Billing provider may be, but is not necessarily, the same person/NPI as the rendering provider.

        From a payer's perspective, this represents the person or entity being reimbursed.

        When a contract exists with the target payer, the billing provider should be the entity contracted with the
        payer.

        In some circumstances, this will be an individual provider. In that case, submit that provider's NPI and the

        tax ID (TIN) that the provider gave to the payer during contracting.

        In other cases, the billing entity will be a medical group. If so, submit the group NPI and the group's tax ID.

        Box 33 on the CMS-1500 claim or Form Locator 1 on a UB-04 claim form.
      title: BillingProviderUpdate
