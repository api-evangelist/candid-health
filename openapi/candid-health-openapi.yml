      operationId: hard-delete-rates
      summary: Hard delete rates
      description: >-
        Hard deletes rates from the system that match the provided dimensions.  This is a destructive operation and
        cannot be undone.  If an empty dimensions object is provided, all rates will be hard deleted.  The maximum
        number of rates this API will delete at a time is 10000.  Returns the number of rates deleted and if that number
        is the maximum, the caller should call this API again to continue deleting rates.
      tags:
        - subpackage_fee-schedules.subpackage_fee-schedules/v3
      parameters:
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
