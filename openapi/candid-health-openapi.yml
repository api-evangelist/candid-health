            number issued to health care providers in the United States
        taxonomy_code:
          type: string
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
        secondary_identification:
          $ref: '#/components/schemas/type_encounter-providers/v2:ProviderSecondaryIdentification'
          description: |-
            Only one of provider_commercial_license_type or secondary_identification may be provided
            837i Loop2310BB G2
            Secondary Identification
      title: RenderingProviderUpdate
    type_service-facility:EncounterServiceFacilityUpdate:
      type: object
      properties:
        organization_name:
          type: string
        npi:
          type: string
          description: >-
            An NPI specific to the service facility if applicable, i.e. if it has one and is not under the billing
            provider's NPI.

            Box 32 section (a) of the CMS-1500 claim form.
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
          description: >-
            zip_plus_four_code is required for service facility address. When the zip_plus_four_code is not available
            use "9998" as per CMS documentation.
        secondary_identification:
          type: string
          description: >-
            An additional identifier for the service facility other than the facility's NPI. Some payers may require
            this field.

            Potential examples: state license number, provider commercial number, or location number.

            Box 32 section (b) of the CMS-1500 claim form.
        mammography_certification_number:
          type: string
          description: >-
            The associated mammography certification number for this service facility. This is a 6 digit code assigned
            by the FDA.
      title: EncounterServiceFacilityUpdate
    type_encounter-providers/v2:TreatingProviderUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        npi:
          type: string
          description: |-
