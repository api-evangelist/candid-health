          required: false
          schema:
            type: string
        - name: supervising_provider_names
          in: query
          description: >-
            A list of supervising provider names to filter by. This will return all charge capture claim_creations which
            include one or more charges with one of the names in this list.
          required: false
          schema:
            type: string
        - name: claim_status
          in: query
