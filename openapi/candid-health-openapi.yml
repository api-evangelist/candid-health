      type: object
      properties:
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/type_commons:ProcedureModifier'
        charge_amount_cents:
          type: integer
          description: >-
            The total amount charged for this service line, factoring in quantity. The system will attempt to set it
            based on the chargemaster configuration and the service line’s quantity. For example, if a single unit has
