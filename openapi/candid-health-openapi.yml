    type_fee-schedules/v3:RateUpload:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - new_rate
              description: 'Discriminator value: new_rate'
            dimensions:
              $ref: '#/components/schemas/type_fee-schedules/v3:Dimensions'
            entries:
              type: array
              items:
                $ref: '#/components/schemas/type_fee-schedules/v3:RateEntry'
          required:
