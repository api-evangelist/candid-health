  /api/encounter-attachments/v1/{encounter_id}:
    get:
      operationId: get
      summary: Get Encounter Attachments
      tags:
        - subpackage_encounter-attachments.subpackage_encounter-attachments/v1
      parameters:
        - name: encounter_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/type_commons:EncounterId'
