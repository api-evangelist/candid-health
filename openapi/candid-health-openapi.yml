          description: Error response with status 404
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - EntityNotFoundError
                  content:
                    $ref: '#/components/schemas/type_commons:EntityNotFoundErrorMessage'
                required:
                  - errorName
                  - content
        '409':
          description: Error response with status 409
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - ChargeExternalIdConflictError
                  content:
                    $ref: '#/components/schemas/type_charge-capture/v1:ChargeExternalIdConflictErrorMessage'
                required:
                  - errorName
                  - content
        '422':
          description: Error response with status 422
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - UnprocessableEntityError
                  content:
                    $ref: '#/components/schemas/type_commons:UnprocessableEntityErrorMessage'
                required:
                  - errorName
                  - content
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '#/components/schemas/type_charge-capture/v1:ChargeCaptureData'
                  description: >-
                    Charge Capture data contains all the fields needed to create an encounter, but listed as optional.
                    Candid will use this data when attempting to bundle multiple Charge Captures into a single
                    encounter.
                charge_external_id:
                  type: string
                  description: >-
                    A client-specified unique ID to associate with this encounter; for example, your internal encounter
                    ID or a Dr. Chrono encounter ID. This field should not contain PHI.
                pre_encounter_patient_id:
                  $ref: '#/components/schemas/type_commons:PreEncounterPatientId'
                pre_encounter_appointment_ids:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_commons:PreEncounterAppointmentId'
                originating_system:
                  type: string
                  description: An optional string field denoting the originating system of the charge.
                claim_creation_category:
                  type: string
                  description: An optional string field denoting the user defined category of the claim creation.
                ehr_source_url:
                  type: string
                  description: >-
                    External URL reference that links to Charge Capture details within the external system (e.g. the EHR
                    visit page). Send full URL format for the external link (e.g.
                    https://emr_charge_capture_url.com/123).
                status:
                  $ref: '#/components/schemas/type_charge-capture/v1:ChargeCaptureStatus'
                  description: the status of the charge capture
                attachment_external_document_ids:
                  type: array
                  items:
                    type: string
                  description: >-
                    Provide external attachment IDs which have been uploaded to Candid. They will be associated with the
                    Encounter at Encounter creation time.
                hl7_message_type:
                  $ref: '#/components/schemas/type_charge-capture/v1:Hl7MessageType'
                  description: >-
                    The HL7 message type that produced this write. Used to differentiate post-submission update
                    behavior. Sent by HL7 producers (conduit); null for manual / script writes.
              required:
                - data
                - charge_external_id
                - pre_encounter_patient_id
                - pre_encounter_appointment_ids
                - status
