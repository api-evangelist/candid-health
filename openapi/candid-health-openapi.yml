    type_claim-submission/v1:ExternalClaimSubmissionCreate:
      type: object
      properties:
        claim_created_at:
          type: string
          format: date-time
          description: When the claim was created in the external system.
        patient_control_number:
          type: string
          description: >-
            The Patient Control Number sent on the claim to the payer. To guarantee compatibility with all payers, this
            field must consist

            only of uppercase letters and numbers and be no more than 14 characters long.
        submission_records:
          type: array
          items:
            $ref: '#/components/schemas/type_claim-submission/v1:ClaimSubmissionRecordCreate'
          description: >-
            A successful claim submission record will be created for each value provided.

            An empty list may be provided for cases where the claim originated in an external system but was never
            submitted to a payer.
      required:
        - claim_created_at
        - patient_control_number
        - submission_records
      title: ExternalClaimSubmissionCreate
    type_related-causes/v1:RelatedCausesInformationCreate:
      type: object
      properties:
        related_causes_code_1:
          $ref: '#/components/schemas/type_related-causes/v1:RelatedCausesCode'
        related_causes_code_2:
          $ref: '#/components/schemas/type_related-causes/v1:RelatedCausesCode'
        state_or_province_code:
          type: string
      required:
        - related_causes_code_1
      title: RelatedCausesInformationCreate
    type_property-and-casualty/v1:PropertyCasualtyPatientIdentifierCreate:
      type: object
      properties:
        property_casualty_patient_identifier_qualifier:
          $ref: '#/components/schemas/type_property-and-casualty/v1:PropertyCasualtyPatientIdentifierQualifier'
          description: |-
            Represents REF01 on the EDI 837 Loop 2010CA Property and Casualty Patient Identifier segment.
            Valid values include 1W (Member Identification Number) and SY (Social Security Number).
        property_casualty_patient_identifier:
          type: string
          description: >-
            Represents REF02 on the EDI 837 Loop 2010CA Property and Casualty Patient Identifier segment. Value cannot
            exceed 50 characters
      required:
        - property_casualty_patient_identifier_qualifier
        - property_casualty_patient_identifier
      title: PropertyCasualtyPatientIdentifierCreate
    type_encounter-providers/v2:BillingProviderSecondaryIdentification:
      type: object
      properties:
        reference_identification:
          type: string
          description: >-
            Represents REF02 on the EDI 837 Loop 2010BB Billing Provider Secondary Identification segment. Value cannot
            exceed 50 characters
        reference_identification_qualifier:
          $ref: '#/components/schemas/type_encounter-providers/v2:BillingProviderSecondaryIdentificationQualifier'
          description: |-
            Represents REF01 on the EDI 837 Loop 2010BB Billing Provider Secondary Identification segment.
            Valid values include G2 (Provider Commercial Number) and LU (Location Number). Defaults to G2 if not set.
      required:
        - reference_identification
      title: BillingProviderSecondaryIdentification
    type_encounter-providers/v2:BillingProvider:
      type: object
      properties:
        first_name:
          type: string
          description: If the provider is an individual, this should be set instead of organization name
        last_name:
          type: string
          description: If the provider is an individual, this should be set instead of organization name
        organization_name:
          type: string
          description: If the provider is an organization, this should be set instead of first + last name
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
        tax_id:
          type: string
          description: >-
            If the provider has a contract with insurance, this must be the same tax ID given to the payer on an IRS W-9
            form completed during contracting.
        npi:
          type: string
        taxonomy_code:
          type: string
        provider_commercial_license_type:
          $ref: '#/components/schemas/type_commons:BillingProviderCommercialLicenseType'
          description: |-
            837i Loop2010BB G2
            Provider Commercial Number
        secondary_identification:
          $ref: '#/components/schemas/type_encounter-providers/v2:BillingProviderSecondaryIdentification'
          description: |-
            Only one of provider_commercial_license_type or secondary_identification may be provided
            837i Loop2010BB G2
            Secondary Identification
      required:
        - address
        - tax_id
        - npi
      description: >-
        The billing provider is the provider or business entity submitting the claim.

        Billing provider may be, but is not necessarily, the same person/NPI as the rendering provider.

        From a payer's perspective, this represents the person or entity being reimbursed.

        When a contract exists with the target payer, the billing provider should be the entity contracted with the
        payer.

        In some circumstances, this will be an individual provider. In that case, submit that provider's NPI and the

        tax ID (TIN) that the provider gave to the payer during contracting.

        In other cases, the billing entity will be a medical group. If so, submit the group NPI and the group's tax ID.

        Box 33 on the CMS-1500 claim or Form Locator 1 on a UB-04 claim form.
      title: BillingProvider
    type_encounter-providers/v2:RenderingProvider:
      type: object
      properties:
        first_name:
          type: string
          description: If the provider is an individual, this should be set instead of organization name
        last_name:
          type: string
          description: If the provider is an individual, this should be set instead of organization name
        organization_name:
          type: string
          description: If the provider is an organization, this should be set instead of first + last name
        npi:
          type: string
          description: |-
            A National Provider Identifier is a unique 10-digit identification
            number issued to health care providers in the United States
        taxonomy_code:
          type: string
        address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
        secondary_identification:
          $ref: '#/components/schemas/type_encounter-providers/v2:ProviderSecondaryIdentification'
          description: |-
            Only one of provider_commercial_license_type or secondary_identification may be provided
            837i Loop2310BB G2
            Secondary Identification
      required:
        - npi
      title: RenderingProvider
    type_service-lines/v2:UniversalServiceLineCreate:
      type: object
      properties:
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/type_commons:ProcedureModifier'
        has_epsdt_indicator:
          type: boolean
          description: |-
            Maps to SV1-11 on the 837-P and Box 24H on the CMS-1500.
            If the value is true, the box will be populated with "Y". Otherwise, the box will not be populated.
        has_family_planning_indicator:
          type: boolean
          description: |-
            Maps to SV1-12 on the 837-P and Box 24I on the CMS-1500.
            If the value is true, the box will be populated with "Y". Otherwise, the box will not be populated.
        quantity:
          $ref: '#/components/schemas/type_commons:Decimal'
          description: |-
            String representation of a Decimal that can be parsed by most libraries.
            For professional claims, a ServiceLine quantity cannot contain more than one digit of precision
            (Example: 1.1 is valid, 1.11 is not). For institutional claims, a ServiceLine quantity cannot contain
            more than three decimal digits of precision.
        units:
          $ref: '#/components/schemas/type_commons:ServiceLineUnits'
        charge_amount_cents:
          type: integer
          description: >-
            The total amount charged for this service line, factoring in quantity. If procedure_code is updated and this
            is not, the system will attempt to set it based on chargemasters entries and the service line’s quantity.
            For example, if a single unit has an entry of 100 cents and 2 units were rendered, the charge_amount_cents
            will be set to 200, if there is no chargemaster entry, it will default to the amount set in this field.
        drug_identification:
          $ref: '#/components/schemas/type_service-lines/v2:DrugIdentification'
        place_of_service_code:
          $ref: '#/components/schemas/type_commons:FacilityTypeCode'
          description: >-
            837p Loop2300, SV105. This enum is not used or required in 837i claims. If your organization does not intend
            to submit claims with a different place of service at the service line level, this field should not be
            populated. 02 for telemedicine, 11 for in-person. Full list
            [here](https://www.cms.gov/Medicare/Coding/place-of-service-codes/Place_of_Service_Code_Set).
        description:
          type: string
          description: >-
            A free-form description to clarify the related data elements and their content. Maps to SV1-01, C003-07 on a
            837-P and SV2-02, C003-07 on a 837-I form.
        date_of_service:
          type: string
          format: date
        end_date_of_service:
          type: string
          format: date
        ordering_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:OrderingProvider'
          description: >-
            Required when the service or supply was ordered by a provider who is different than the rendering provider
            for this service line.

            If not required by this implementation guide, do not send.
        test_results:
          type: array
          items:
            $ref: '#/components/schemas/type_service-lines/v2:TestResult'
          description: >-
            Contains a list of test results. Test result types may map to MEA-02 on the 837-P (ex: Hemoglobin,
            Hematocrit).

            This is unused by 837-i and ignored for institutional service lines.

            No more than 5 MEA-02 test results may be submitted per service line.
        note:
          type: string
          description: Maps to NTE02 loop 2400 on the EDI 837.
        prior_authorization_number:
          type: string
          description: >-
            Prior authorization number for this service line. Maps to the appropriate REF segment on Loop 2400 of the
            EDI 837p. This is not used for institutional claims (EDI 837i).
        external_id:
          type: string
          description: >-
            An external identifier for this service line. This is not used in the EDI 837, but can be used to identify
            the service line in external systems.

            This field should not contain PHI. Must be unique on a given claim.
        diagnosis_pointers:
          type: array
          items:
            type: integer
          description: Indices (zero-indexed) of all the diagnoses this service line references
        revenue_code:
          type: string
          description: >-
            A 4 digit code that specifies facility department or type of service arrangement for institutional service
            line items (837i). This code is not required for professional claim billing (837p).
        procedure_code:
          type: string
      required:
        - quantity
        - units
      title: UniversalServiceLineCreate
