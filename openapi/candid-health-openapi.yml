  /api/diagnoses/v2:
    post:
      operationId: create
      summary: Create diagnosis
      description: Creates a new diagnosis for an encounter
      tags:
        - subpackage_diagnoses
      parameters:
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_diagnoses:Diagnosis'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_diagnoses:StandaloneDiagnosisCreate'
  /api/diagnoses/v2/{diagnosis_id}:
    patch:
      operationId: update
      summary: Update diagnosis
      description: Updates the diagnosis record matching the provided `diagnosis_id`
      tags:
        - subpackage_diagnoses
      parameters:
        - name: diagnosis_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/type_diagnoses:DiagnosisId'
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_diagnoses:Diagnosis'
        '404':
          description: Error response with status 404
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - DiagnosisNotFoundHTTPError
                  content:
                    $ref: '#/components/schemas/type_diagnoses:DiagnosisNotFoundError'
                required:
                  - errorName
                  - content
        '422':
          description: Error response with status 422
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - DisallowMultiplePrimaryDiagnosisHTTPError
                  content:
                    $ref: '#/components/schemas/type_diagnoses:DisallowMultiplePrimaryDiagnosisError'
                required:
                  - errorName
                  - content
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Empty string not allowed.
                code_type:
                  $ref: '#/components/schemas/type_diagnoses:DiagnosisTypeCode'
                  description: >-
                    Typically, providers submitting claims to Candid are using ICD-10 diagnosis codes. If you are using
                    ICD-10 codes, the primary diagnosis code listed on the claim should use the ABK code_type. If more
                    than one diagnosis is being submitted on a claim, please use ABF for the rest of the listed
                    diagnoses. If you are using ICD-9 diagnosis codes, use BK and BF for the principal and following
                    diagnosis code(s) respectively.
                code:
                  type: string
                  description: |-
                    Empty string not allowed.
                    Should be of the appropriate format for the provided `code_type`.
                    Must obey the ICD-10 format if an ICD-10 code_type is provided, specifically:
                      - Letter
                      - Digit
                      - Digit or the letter `A` or `B`
                      - (Optional) Period `.`
                      - Up to 4 (or as few as 0) letters and digits
                present_on_admission_indicator:
                  $ref: '#/components/schemas/type_yes-no-indicator:YesNoIndicator'
                  description: >-
                    For Institutional claims only.

                    A "Y" indicates that the onset occurred prior to admission to the hospital.

                    An "N" indicates that the onset did NOT occur prior to admission to the hospital.

                    A "U" indicates that it is unknown whether the onset occurred prior to admission to the hospital or
                    not.
    delete:
      operationId: delete
      summary: Delete diagnosis
      description: Deletes the diagnosis record associated with the provided `diagnosis_id`
      tags:
        - subpackage_diagnoses
      parameters:
        - name: diagnosis_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/type_diagnoses:DiagnosisId'
        - name: Authorization
          in: header
          description: OAuth authentication
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
        '404':
          description: Error response with status 404
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - DiagnosisNotFoundHTTPError
                  content:
                    $ref: '#/components/schemas/type_diagnoses:DiagnosisNotFoundError'
                required:
                  - errorName
                  - content
        '422':
          description: Error response with status 422
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorName:
                    type: string
                    enum:
                      - ServiceLinesMustHaveAtLeastOneDiagnosisHTTPError
                  content:
                    $ref: '#/components/schemas/type_diagnoses:ServiceLinesMustHaveAtLeastOneDiagnosisError'
                required:
                  - errorName
                  - content
