    type_encounters/v4:Encounter:
      type: object
      properties:
        external_id:
          $ref: '#/components/schemas/type_commons:EncounterExternalId'
          description: |-
            A client-specified unique ID to associate with this encounter;
            for example, your internal encounter ID or a Dr. Chrono encounter ID.
            This field should not contain PHI.
        date_of_service:
          type: string
          format: date
          description: >-
            Date formatted as YYYY-MM-DD; eg: 2019-08-24.

            This date must be the local date in the timezone where the service occurred.

            Box 24a on the CMS-1500 claim form or Form Locator 45 on the UB-04 claim form.

            If service occurred over a range of dates, this should be the start date.

            date_of_service must be defined on either the encounter or the service lines but not both.

            If there are greater than zero service lines, it is recommended to specify date_of_service on the
            service_line instead of on the encounter to prepare for future API versions.
        end_date_of_service:
          type: string
          format: date
          description: >-
            Date formatted as YYYY-MM-DD; eg: 2019-08-25.

            This date must be the local date in the timezone where the service occurred.

            If omitted, the Encounter is assumed to be for a single day.

            Must not be temporally before the date_of_service field.

            If there are greater than zero service lines, it is recommended to specify end_date_of_service on the
            service_line instead of on the encounter to prepare for future API versions.
        patient_authorized_release:
          type: boolean
          description: |-
            Whether this patient has authorized the release of medical information
            for billing purpose.
            Box 12 on the CMS-1500 claim form  or Form Locator 52 on a UB-04 claim form.
        benefits_assigned_to_provider:
          type: boolean
          description: |-
            Whether this patient has authorized insurance payments to be made to you,
            not them. If false, patient may receive reimbursement.
            Box 13 on the CMS-1500 claim form or Form Locator 53 on a UB-04 claim form.
        provider_accepts_assignment:
          type: boolean
          description: >-
            Whether you have accepted the patient's authorization for insurance payments

            to be made to you, not them.

            Box 27 on the CMS-1500 claim form. There is no exact equivalent of this field on a UB-04 claim, however
            contributes to the concept of Form Locator 53.
        appointment_type:
          type: string
          description: 'Human-readable description of the appointment type (ex: "Acupuncture - Headaches").'
        existing_medications:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:Medication'
        interventions:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:Intervention'
        pay_to_address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
          description: Specifies the address to which payments for the claim should be sent.
        synchronicity:
          $ref: '#/components/schemas/type_encounters/v4:SynchronicityType'
          description: |-
            Whether or not this was a synchronous or asynchronous encounter.
            Asynchronous encounters occur when providers and patients communicate online using
            forms, instant messaging, or other pre-recorded digital mediums.
            Synchronous encounters occur in live, real-time settings where the patient interacts
            directly with the provider, such as over video or a phone call.
        vitals:
          $ref: '#/components/schemas/type_encounters/v4:Vitals'
        billable_status:
          $ref: '#/components/schemas/type_encounters/v4:BillableStatusType'
          description: |-
            Defines if the Encounter is to be billed by Candid to the responsible_party.
            Examples for when this should be set to NOT_BILLABLE include
            if the Encounter has not occurred yet or if there is no intention of ever billing the responsible_party.
        additional_information:
          type: string
          description: |-
            Defines additional information on the claim needed by the payer.
            Box 19 on the CMS-1500 claim form or Form Locator 80 on a UB-04 claim form.
        service_authorization_exception_code:
          $ref: '#/components/schemas/type_encounters/v4:ServiceAuthorizationExceptionCode'
          description: >-
            837p Loop2300 REF*4N

            Required when mandated by government law or regulation to obtain authorization for specific service(s) but,
            for the

            reasons listed in one of the enum values of ServiceAuthorizationExceptionCode, the service was performed
            without

            obtaining the authorization.
        admission_date:
          type: string
          format: date
          description: |-
            837p Loop2300 DTP*435, CMS-1500 Box 18 or UB-04 Form Locator 12.
            Required on all ambulance claims when the patient was known to be admitted to the hospital.
            OR
            Required on all claims involving inpatient medical visits.
        discharge_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*096, CMS-1500 Box 18 Required for inpatient claims when the patient was discharged from
            the facility and the discharge date is known. Not used on an institutional claim.
        onset_of_current_illness_or_symptom_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*431, CMS-1500 Box 14

            Required for the initial medical service or visit performed in response to a medical emergency when the date
            is available and is different than the date of service.

            OR

            This date is the onset of acute symptoms for the current illness or condition.
             For UB-04 claims, this is populated separately via occurrence codes.
        last_menstrual_period_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*484, CMS-1500 Box 14

            Required when, in the judgment of the provider, the services on this claim are related to the patient's
            pregnancy.

            This field is populated separately via occurrence codes for UB-04 claim forms.
        delay_reason_code:
          $ref: '#/components/schemas/type_commons:DelayReasonCode'
          description: |-
            Code indicating the reason why a claim submission was delayed.
            Corresponds to CLM-20 in the 837 specification (both professional and institutional).
        accident_state_or_province_code:
          $ref: '#/components/schemas/type_commons:State'
          description: 837i-REF1000 -- an optional state indicating where an accident related to the encounter occurred.
        claim_creation_id:
          $ref: '#/components/schemas/type_commons:ChargeCaptureClaimCreationId'
          description: >-
            If the encounter was created from ingested charge captures, this is the associated Charge Capture Claim
            Creation Id.
        patient_control_number:
          type: string
          description: >-
            A patient control number (PCN) is a unique identifier assigned to a patient within a healthcare system or
            facility.

            It's used to track and manage a patient's medical records, treatments, and other healthcare-related
            information.
        encounter_id:
          $ref: '#/components/schemas/type_commons:EncounterId'
        claims:
          type: array
          items:
            $ref: '#/components/schemas/type_claims:Claim'
        patient:
          $ref: '#/components/schemas/type_individual:Patient'
          description: Contains the identification information of the individual receiving medical services.
        guarantor:
          $ref: '#/components/schemas/type_guarantor/v1:Guarantor'
          description: Personal and contact info for the guarantor of the patient responsibility.
        billing_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
          description: >-
            The billing provider is the provider or business entity submitting the claim. Billing provider may be, but
            is not necessarily, the same person/NPI as the rendering provider. From a payer's perspective, this
            represents the person or entity being reimbursed. When a contract exists with the target payer, the billing
            provider should be the entity contracted with the payer. In some circumstances, this will be an individual
            provider. In that case, submit that provider's NPI and the tax ID (TIN) that the provider gave to the payer
            during contracting. In other cases, the billing entity will be a medical group. If so, submit the group NPI
            and the group's tax ID. Box 33 on the CMS-1500 claim form or Form Locator 1 on a UB-04 claim form.
        rendering_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
          description: >-
            The rendering provider is the practitioner -- physician, nurse practitioner, etc. -- performing the service.

            For telehealth services, the rendering provider performs the visit, asynchronous communication, or other
            service. The rendering provider address should generally be the same as the service facility address.
        attending_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
          description: >-
            837i NM1 2500 variant for Loop ID-2310.  Used to indicate the individual whom has overall responsibility for
            the patient in institutional claims processing.
        admission_hour:
          type: integer
          description: |-
            837i Loop 2300 DTP-03
            Extension of the admission date with hour (0-23) details.
            Required for institutional submission.
        admission_type_code:
          $ref: '#/components/schemas/type_x12/v1:TypeOfAdmissionOrVisitCode'
          description: >-
            837i Loop 2300 CL1-01 Code used to indicate the priority of an admission or visit. Equivalent to Form
            Locator 14 Priority of Admission on a UB-04 claim, not used on CMS-1500 claim forms.
        admission_source_code:
          $ref: '#/components/schemas/type_x12/v1:PointOfOriginForAdmissionOrVisitCode'
          description: >-
            837i Loop 2300 CLI1-02 Code used to indicate the conditions under which an admission occurs. Equivalent to
            Form Locator 15 Point of Origin on a UB-04 claim, not used on CMS-1500 claim forms.
        discharge_hour:
          type: integer
          description: |-
            837i Loop 2300 DTP-03
            Extension of the discharge date with hour (0-23) details.
        discharge_status:
          $ref: '#/components/schemas/type_x12/v1:PatientDischargeStatusCode'
          description: |-
            837i CL1-03 or Form Locator 17 on a UB-04 claim form. This is a required field on UB-04 claims.
            Code indicating patient status as of the "statement covers through date".
        operating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
          description: >-
            837i NM1 2500 variant for Loop ID-2310.  Used to indicate the individual whom has primary responsibility for
            surgical procedures in institutional claims processing.
        other_operating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
          description: >-
            837i NM1 2500 variant for Loop ID-2310.  Used to indicate the individual whom has secondary responsibility
            for surgical procedures in institutional claims processing.  Only used when operating_provider is also set.
        treating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterAdditionalProvider'
          description: >-
            The treating provider is the provider who treats the patient. This is only supported for professional
            encounters.
        related_causes_information:
          $ref: '#/components/schemas/type_related-causes/v1:RelatedCausesInformation'
        property_casualty_claim_number:
          type: string
          description: 837p Loop2010 REF02, CMS1500 Box 11b
        accident_date:
          type: string
          format: date
          description: 837p Loop2300 DTP*439, CMS1500 Box 15
        property_casualty_patient_identifier:
          $ref: '#/components/schemas/type_property-and-casualty/v1:PropertyCasualtyPatientIdentifier'
          description: |-
            Patient identifier for Property and Casualty claims.
            837p Loop2010CA
        submission_expectation:
          $ref: '#/components/schemas/type_encounters/v4:EncounterSubmissionExpectation'
          description: >-
            Describes the currently expected target form for this encounter.  This effects what validations and queues
            the form is processed under.  When this value is not set, it should be assumed to be TARGET_PROFESSIONAL.
        type_of_bill:
          $ref: '#/components/schemas/type_x12/v1:TypeOfBillComposite'
          description: >-
            Four digit code used in institutional forms to indicate the type of bill (e.g., hospital inpatient, hospital
            outpatient). First digit is a leading 0, followed by the type_of_facility, type_of_care, then
            frequency_code. Professional forms are not required to submit this attribute. You may send the 4 digit code
            via raw_code, or each individual digit separately via composite_codes.
        referring_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
        initial_referring_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
        supervising_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:EncounterProvider'
        service_facility:
          $ref: '#/components/schemas/type_service-facility:EncounterServiceFacility'
          description: >-
            Encounter Service facility is typically the location a medical service was rendered, such as a provider
            office or hospital. For telehealth, service facility can represent the provider's location when the service
            was delivered (e.g., home), or the location where an in-person visit would have taken place, whichever is
            easier to identify. If the provider is in-network, service facility may be defined in payer contracts. Box
            32 on the CMS-1500 claim form. There is no equivalent on the paper UB-04 claim form, but this field is
            equivalent to Loop 2310E Service Facility Location details on an 837i form, and is used when this is
            different to the entity identified as the Billing Provider. Note that for an in-network claim to be
            successfully adjudicated, the service facility address listed
        subscriber_primary:
          $ref: '#/components/schemas/type_individual:Subscriber'
          description: >-
            Subscriber_primary is required when responsible_party is INSURANCE_PAY (i.e. when the claim should be billed
            to insurance).

            These are not required fields when responsible_party is SELF_PAY (i.e. when the claim should be billed to
            the patient).

            However, if you collect this for patients, even self-pay, we recommend including it when sending encounters
            to Candid.

            Note: Cash Pay is no longer a valid payer_id in v4, please use responsible party to define self-pay claims.
        subscriber_secondary:
          $ref: '#/components/schemas/type_individual:Subscriber'
          description: Contains details of the secondary insurance subscriber.
        subscriber_tertiary:
          $ref: '#/components/schemas/type_individual:Subscriber'
          description: Contains details of the tertiary insurance subscriber.
        prior_authorization_number:
          $ref: '#/components/schemas/type_encounters/v4:PriorAuthorizationNumber'
          description: Box 23 on the CMS-1500 claim form or Form Locator 63 on a UB-04 claim form.
        responsible_party:
          $ref: '#/components/schemas/type_encounters/v4:ResponsiblePartyType'
          description: Defines the party to be billed with the initial balance owed on the claim.
        url:
          $ref: '#/components/schemas/type_commons:LinkUrl'
          description: URL that links directly to the claim created in Candid.
        diagnoses:
          type: array
          items:
            $ref: '#/components/schemas/type_diagnoses:Diagnosis'
          description: >-
            Contains the primary and other diagnosis health care code information objects associated with this
            encounter. For professional claims, these diagnoses correspond with those that are set on service lines
            directly, where as for institutional claims these are only associated directly with the claim itself.  See
            also Health Care Code Information objects and corresponding apis.
        clinical_notes:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:ClinicalNoteCategory'
          description: >-
            Holds a collection of clinical observations made by healthcare providers during patient encounters. Please
            note that medical records for appeals should be sent using the Encounter Attachments API.
        billing_notes:
          type: array
          items:
            $ref: '#/components/schemas/type_billing-notes/v2:BillingNote'
          description: |-
            Spot to store misc, human-readable, notes about this encounter to be
            used in the billing process.
        place_of_service_code:
          $ref: '#/components/schemas/type_commons:FacilityTypeCode'
          description: >-
            Box 24B on the CMS-1500 claim form. 837p Loop2300, CLM-05-1. 02 for telemedicine, 11 for in-person. Full
            list [here](https://www.cms.gov/Medicare/Coding/place-of-service-codes/Place_of_Service_Code_Set).
        place_of_service_code_as_submitted:
          $ref: '#/components/schemas/type_commons:FacilityTypeCode'
          description: >-
            Box 24B on the CMS-1500 claim form. 837p Loop2300, CLM-05-1. 02 for telemedicine, 11 for in-person. Full
            list [here](https://www.cms.gov/Medicare/Coding/place-of-service-codes/Place_of_Service_Code_Set).
        patient_histories:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:PatientHistoryCategory'
        patient_payments:
          type: array
          items:
            $ref: '#/components/schemas/type_patient-payments/v3:PatientPayment'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/type_tags:Tag'
        coding_attribution:
          $ref: '#/components/schemas/type_encounters/v4:CodingAttributionType'
          description: The entity that performed the coding of medical services for the claim.
        work_queue_id:
          $ref: '#/components/schemas/type_commons:WorkQueueId'
        work_queue_membership_activated_at:
          type: string
          format: date-time
        owner_of_next_action:
          $ref: '#/components/schemas/type_encounters/v4:EncounterOwnerOfNextActionType'
          description: >-
            The party who is responsible for taking the next action on an Encounter, as defined by ownership of open
            Tasks.
        submission_origin:
          $ref: '#/components/schemas/type_encounters/v4:EncounterSubmissionOriginType'
          description: >-
            The party who originally submitted the Claim.

            For Claims originating in Candid, this will be EncounterSubmissionOriginType.CANDID.

            For Encounters created with an external_claim_submission object, this will be
            EncounterSubmissionOriginType.EXTERNAL.
        schema_instances:
          type: array
          items:
            $ref: '#/components/schemas/type_custom-schemas/v1:SchemaInstance'
          description: |-
            Key-value pairs that must adhere to a schema created via the Custom Schema API. Multiple schema
            instances cannot be created for the same schema on an encounter.
        referral_number:
          type: string
          description: Refers to REF*9F on the 837p. Value cannot be greater than 50 characters.
        epsdt_referral:
          $ref: '#/components/schemas/type_encounters/v4:EPSDTReferral'
          description: Refers to Box 24H on the CMS1500 form and Loop 2300 CRC - EPSDT Referral on the 837P and 837i form
        claim_supplemental_information:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:ClaimSupplementalInformation'
          description: Refers to Loop 2300 - Segment PWK on the 837P and 837i form. No more than 10 entries are permitted.
        secondary_payer_carrier_code:
          type: string
          description: >-
            When Medicaid is billed as the secondary payer the Carrier Code is used to identify the primary payer. This
            is required for certain states.
        last_submitted_at:
          type: string
          format: date-time
          description: The date and time the encounter was last submitted to a payer.
        created_at:
          type: string
          format: date-time
          description: The date and time the encounter was created.
        next_responsible_party:
          $ref: '#/components/schemas/type_commons:NextResponsibleParty'
          description: The party (payer, patient, etc.) responsible for the remainder of the balance on the claim.
        organization_id:
          $ref: '#/components/schemas/type_commons:OrganizationId'
      required:
        - external_id
        - patient_authorized_release
        - benefits_assigned_to_provider
        - provider_accepts_assignment
        - billable_status
        - encounter_id
        - claims
        - patient
        - billing_provider
        - rendering_provider
        - service_facility
        - responsible_party
        - url
        - diagnoses
        - clinical_notes
        - patient_histories
        - patient_payments
        - tags
        - owner_of_next_action
        - submission_origin
        - schema_instances
        - created_at
      title: Encounter
    type_encounters/v4:EncounterPage:
