            integrations. Updates made in the Candid UI will unset this flag. Defaults to false.
        advanced_directives:
          type: array
          items:
            $ref: '#/components/schemas/type_pre-encounter/patients/v1:AdvancedDirective'
        hipaa_code:
          type: string
      required:
        - name
        - other_names
        - birth_date
        - biological_sex
        - primary_address
        - other_addresses
        - other_telecoms
        - contacts
        - general_practitioners
