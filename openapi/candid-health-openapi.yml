    type_x12/v1:TypeOfBillCompositeUpdate:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - raw_code
              description: 'Discriminator value: raw_code'
            value:
              type: string
          required:
            - type
            - value
          description: Full 4 digit type of bill code, starting with a leading 0.
        - type: object
          properties:
            type:
              type: string
              enum:
                - composite_codes
              description: 'Discriminator value: composite_codes'
            type_of_facility:
              $ref: '#/components/schemas/type_x12/v1:TypeOfFacilityCode'
              description: The FL04 Institutional type of facility code for the bill.  The second digit of the composite code.
            type_of_care:
              $ref: '#/components/schemas/type_x12/v1:TypeOfCareCode'
              description: The FL04 Institutional type of care code for the bill.  The third digit of the composite code.
            frequency_code:
              $ref: '#/components/schemas/type_x12/v1:TypeOfBillFrequencyCode'
              description: The FL04 Institutional frequency code for the bill.  The fourth digit of the composite code.
          required:
            - type
            - type_of_facility
            - type_of_care
            - frequency_code
          description: Use composite_codes to send type_of_care, type_of_facility and frequency_code as separate enums.
      discriminator:
        propertyName: type
      description: |-
        A type of bill can either be seen as a compositio of structured parts, or as a literal string.
        This union represents the potential to express a type of bill either as one of those two shapes.
        Passing a string, this update will be seen as a complete 4 digit code, along with a padding code 0, that
        should match a valid composition.
        Passing as a structure, the update will be seen as three parts and will be joined together by the server
        to represent a valid composition for you.
        Which you use depends upon whether you are "passing through" coded information or making a decision about its
        structure explicitly.
      title: TypeOfBillCompositeUpdate
    type_encounters-universal:UniversalEncounterCreate:
      type: object
      properties:
        external_id:
          $ref: '#/components/schemas/type_commons:EncounterExternalId'
          description: |-
            A client-specified unique ID to associate with this encounter;
            for example, your internal encounter ID or a Dr. Chrono encounter ID.
            This field should not contain PHI.
        date_of_service:
          type: string
          format: date
          description: >-
            Date formatted as YYYY-MM-DD; eg: 2019-08-24.

            This date must be the local date in the timezone where the service occurred.

            Box 24a on the CMS-1500 claim form or Form Locator 45 on the UB-04 claim form.

            If service occurred over a range of dates, this should be the start date.

            date_of_service must be defined on either the encounter or the service lines but not both.

            If there are greater than zero service lines, it is recommended to specify date_of_service on the
            service_line instead of on the encounter to prepare for future API versions.
        end_date_of_service:
          type: string
          format: date
          description: >-
            Date formatted as YYYY-MM-DD; eg: 2019-08-25.

            This date must be the local date in the timezone where the service occurred.

            If omitted, the Encounter is assumed to be for a single day.

            Must not be temporally before the date_of_service field.

            If there are greater than zero service lines, it is recommended to specify end_date_of_service on the
            service_line instead of on the encounter to prepare for future API versions.
        patient_authorized_release:
          type: boolean
          description: |-
            Whether this patient has authorized the release of medical information
            for billing purpose.
            Box 12 on the CMS-1500 claim form  or Form Locator 52 on a UB-04 claim form.
        benefits_assigned_to_provider:
          type: boolean
          description: |-
            Whether this patient has authorized insurance payments to be made to you,
            not them. If false, patient may receive reimbursement.
            Box 13 on the CMS-1500 claim form or Form Locator 53 on a UB-04 claim form.
        provider_accepts_assignment:
          type: boolean
          description: >-
            Whether you have accepted the patient's authorization for insurance payments

            to be made to you, not them.

            Box 27 on the CMS-1500 claim form. There is no exact equivalent of this field on a UB-04 claim, however
            contributes to the concept of Form Locator 53.
        appointment_type:
          type: string
          description: 'Human-readable description of the appointment type (ex: "Acupuncture - Headaches").'
        existing_medications:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:Medication'
        interventions:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:Intervention'
        pay_to_address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
          description: Specifies the address to which payments for the claim should be sent.
        synchronicity:
          $ref: '#/components/schemas/type_encounters/v4:SynchronicityType'
          description: |-
            Whether or not this was a synchronous or asynchronous encounter.
            Asynchronous encounters occur when providers and patients communicate online using
            forms, instant messaging, or other pre-recorded digital mediums.
            Synchronous encounters occur in live, real-time settings where the patient interacts
            directly with the provider, such as over video or a phone call.
        vitals:
          $ref: '#/components/schemas/type_encounters/v4:Vitals'
        billable_status:
          $ref: '#/components/schemas/type_encounters/v4:BillableStatusType'
          description: |-
            Defines if the Encounter is to be billed by Candid to the responsible_party.
            Examples for when this should be set to NOT_BILLABLE include
            if the Encounter has not occurred yet or if there is no intention of ever billing the responsible_party.
        additional_information:
          type: string
          description: |-
            Defines additional information on the claim needed by the payer.
            Box 19 on the CMS-1500 claim form or Form Locator 80 on a UB-04 claim form.
        service_authorization_exception_code:
          $ref: '#/components/schemas/type_encounters/v4:ServiceAuthorizationExceptionCode'
          description: >-
            837p Loop2300 REF*4N

            Required when mandated by government law or regulation to obtain authorization for specific service(s) but,
            for the

            reasons listed in one of the enum values of ServiceAuthorizationExceptionCode, the service was performed
            without

            obtaining the authorization.
        admission_date:
          type: string
          format: date
          description: |-
            837p Loop2300 DTP*435, CMS-1500 Box 18 or UB-04 Form Locator 12.
            Required on all ambulance claims when the patient was known to be admitted to the hospital.
            OR
            Required on all claims involving inpatient medical visits.
        discharge_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*096, CMS-1500 Box 18 Required for inpatient claims when the patient was discharged from
            the facility and the discharge date is known. Not used on an institutional claim.
        onset_of_current_illness_or_symptom_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*431, CMS-1500 Box 14

            Required for the initial medical service or visit performed in response to a medical emergency when the date
            is available and is different than the date of service.

            OR

            This date is the onset of acute symptoms for the current illness or condition.
             For UB-04 claims, this is populated separately via occurrence codes.
        last_menstrual_period_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*484, CMS-1500 Box 14

            Required when, in the judgment of the provider, the services on this claim are related to the patient's
            pregnancy.

            This field is populated separately via occurrence codes for UB-04 claim forms.
        delay_reason_code:
          $ref: '#/components/schemas/type_commons:DelayReasonCode'
          description: |-
            Code indicating the reason why a claim submission was delayed.
            Corresponds to CLM-20 in the 837 specification (both professional and institutional).
        patient:
          $ref: '#/components/schemas/type_individual:PatientCreate'
          description: Contains the identification information of the individual receiving medical services.
        referring_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:ReferringProvider'
          description: |-
            The final provider who referred the services that were rendered.
            All physicians who order services or refer Medicare beneficiaries must
            report this data.
        initial_referring_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:InitialReferringProvider'
          description: >-
            The second iteration of Loop ID-2310 on an 837P form. Use code "P3 - Primary Care Provider" in this loop to

            indicate the initial referral from the primary care provider or whatever provider wrote the initial referral
            for this patient's episode of care being billed/reported in this transaction.

            Not used in an 837i claim
        supervising_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:SupervisingProvider'
          description: >-
            Required when the rendering provider is supervised by a physician. If not required by this implementation
            guide, do not send.
        treating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:TreatingProvider'
          description: >-
            The treating provider is the provider who treats the patient. This is only supported for professional
            encounters.
        service_facility:
          $ref: '#/components/schemas/type_service-facility:EncounterServiceFacilityBase'
          description: >-
            Encounter Service facility is typically the location a medical service was rendered, such as a provider
            office or hospital. For telehealth, service facility can represent the provider's location when the service
            was delivered (e.g., home), or the location where an in-person visit would have taken place, whichever is
            easier to identify. If the provider is in-network, service facility may be defined in payer contracts. Box
            32 on the CMS-1500 claim form. There is no equivalent on the paper UB-04 claim form, but this field is
            equivalent to Loop 2310E Service Facility Location details on an 837i form, and is used when this is
            different to the entity identified as the Billing Provider. Note that for an in-network claim to be
            successfully adjudicated, the service facility address listed. This field is mutually exclusive with
            service_facility_id — providing both will result in a 422 error.
        service_facility_id:
          $ref: '#/components/schemas/type_organization-service-facilities/v2:OrganizationServiceFacilityId'
          description: >-
            The ID of an existing Organization Service Facility to use for this encounter. The service facility's
            canonical data (name, address, NPI, etc.) will be populated automatically. If the value does not match an
            existing Organization Service Facility, the request will fail with a 422 error. This field is mutually
            exclusive with service_facility — providing both will result in a 422 error.
        subscriber_primary:
          $ref: '#/components/schemas/type_individual:SubscriberCreate'
          description: >-
            Subscriber_primary is required when responsible_party is INSURANCE_PAY (i.e. when the claim should be billed
            to insurance).

            These are not required fields when responsible_party is SELF_PAY (i.e. when the claim should be billed to
            the patient).

            However, if you collect this for patients, even self-pay, we recommend including it when sending encounters
            to Candid.

            Note: Cash Pay is no longer a valid payer_id in v4, please use responsible party to define self-pay claims.
        subscriber_secondary:
          $ref: '#/components/schemas/type_individual:SubscriberCreate'
          description: Please always include this when you have it, even for self-pay claims.
        subscriber_tertiary:
          $ref: '#/components/schemas/type_individual:SubscriberCreate'
          description: Please always include this when you have it, even for self-pay claims.
        prior_authorization_number:
          $ref: '#/components/schemas/type_encounters/v4:PriorAuthorizationNumber'
          description: Box 23 on the CMS-1500 claim form or Form Locator 63 on a UB-04 claim form.
        responsible_party:
          $ref: '#/components/schemas/type_encounters/v4:ResponsiblePartyType'
          description: Defines the party to be billed with the initial balance owed on the claim.
        clinical_notes:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:ClinicalNoteCategoryCreate'
          description: >-
            Holds a collection of clinical observations made by healthcare providers during patient encounters. Please
            note that medical records for appeals should be sent using the Encounter Attachments API.
        billing_notes:
          type: array
          items:
            $ref: '#/components/schemas/type_billing-notes/v2:BillingNoteBase'
          description: |-
            Spot to store misc, human-readable, notes about this encounter to be used
            in the billing process.
        patient_histories:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:PatientHistoryCategory'
        guarantor:
          $ref: '#/components/schemas/type_guarantor/v1:GuarantorCreate'
          description: Personal and contact info for the guarantor of the patient responsibility.
        external_claim_submission:
          $ref: '#/components/schemas/type_claim-submission/v1:ExternalClaimSubmissionCreate'
          description: >-
            To be included for claims that have been submitted outside of Candid.

            Candid supports posting remits and payments to these claims and working them in-platform (e.g. editing,
            resubmitting).
        tag_ids:
          type: array
          items:
            $ref: '#/components/schemas/type_tags:TagId'
          description: Names of tags that should be on the encounter.
        schema_instances:
          type: array
          items:
            $ref: '#/components/schemas/type_custom-schemas/v1:SchemaInstance'
          description: |-
            Key-value pairs that must adhere to a schema created via the Custom Schema API. Multiple schema
            instances cannot be created for the same schema on an encounter.
        referral_number:
          type: string
          description: Refers to REF*9F on the 837p and 837i. Value cannot be greater than 50 characters.
        epsdt_referral:
          $ref: '#/components/schemas/type_encounters/v4:EPSDTReferral'
          description: Refers to Box 24H on the CMS1500 form and Loop 2300 CRC - EPSDT Referral on the 837P and 837i form
        claim_supplemental_information:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:ClaimSupplementalInformation'
          description: Refers to Loop 2300 - Segment PWK on the 837P and 837i forms. No more than 10 entries are permitted.
        secondary_payer_carrier_code:
          type: string
          description: >-
            When Medicaid is billed as the secondary payer the Carrier Code is used to identify the primary payer. This
            is required for certain states.
        related_causes_information:
          $ref: '#/components/schemas/type_related-causes/v1:RelatedCausesInformationCreate'
          description: Corresponds to box 10a on the CMS-1500 (Loop 2300 on 837)
        property_casualty_claim_number:
          type: string
          description: 837p Loop2010 REF02, CMS1500 Box 11b
        accident_date:
          type: string
          format: date
          description: 837p Loop2300 DTP*439, CMS1500 Box 15
        property_casualty_patient_identifier:
          $ref: '#/components/schemas/type_property-and-casualty/v1:PropertyCasualtyPatientIdentifierCreate'
          description: |-
            Patient identifier for Property and Casualty claims
            837p Loop 2010CA
        billing_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:BillingProvider'
          description: >-
            The billing provider is the provider or business entity submitting the claim. Billing provider may be, but
            is not necessarily, the same person/NPI as the rendering provider. From a payer's perspective, this
            represents the person or entity being reimbursed. When a contract exists with the target payer, the billing
            provider should be the entity contracted with the payer. In some circumstances, this will be an individual
            provider. In that case, submit that provider's NPI and the tax ID (TIN) that the provider gave to the payer
            during contracting. In other cases, the billing entity will be a medical group. If so, submit the group NPI
            and the group's tax ID. Box 33 on the CMS-1500 claim or Form Locator 1 on a UB-04 claim form.
        place_of_service_code:
          $ref: '#/components/schemas/type_commons:FacilityTypeCode'
          description: >-
            Box 24B on the CMS-1500 claim form. 837p Loop2300, CLM-05-1. This box is not used on a UB-04 or 837i claim
            form. 02 for telemedicine, 11 for in-person. Full list
            [here](https://www.cms.gov/Medicare/Coding/place-of-service-codes/Place_of_Service_Code_Set).
        rendering_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:RenderingProvider'
          description: >-
            The rendering provider is the practitioner -- physician, nurse practitioner, etc. -- performing the service.

            For telehealth services, the rendering provider performs the visit, asynchronous communication, or other
            service. The rendering provider address should generally be the same as the service facility address.
        service_lines:
          type: array
          items:
            $ref: '#/components/schemas/type_service-lines/v2:UniversalServiceLineCreate'
        health_care_code_information:
          $ref: '#/components/schemas/type_health-care-code-information/v1:HealthCareCodeInformationCreate'
          description: >-
            The health care code information associated with this encounter, which includes things such as diagnoses,
            vitals, procedures, occurrences, reason for visit, and numerous other code related fields.
        submission_expectation:
          $ref: '#/components/schemas/type_encounters/v4:EncounterSubmissionExpectation'
          description: >-
            Describes the currently expected target form for this encounter.  This can change later, but it orients this
            encounter in the pipeline and effects reporting.
        attending_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:RenderingProvider'
          description: >-
            837i NM1 2500 variant for Loop ID-2310.  Used to indicate the individual whom has overall responsibility for
            the patient in institutional claims processing.
        admission_hour:
          type: integer
          description: |-
            837i Loop 2300 DTP-03
            Extension of the admission date with hour (0-23 integer) details.
        admission_type_code:
          $ref: '#/components/schemas/type_x12/v1:TypeOfAdmissionOrVisitCode'
          description: >-
            837i Loop 2300 CL1-01 Code used to indicate the priority of an admission or visit. Equivalent to Form
            Locator 14 Priority of Admission on a UB-04 claim, not used on CMS-1500 claim forms.
        admission_source_code:
          $ref: '#/components/schemas/type_x12/v1:PointOfOriginForAdmissionOrVisitCode'
          description: >-
            837i Loop 2300 CLI1-02 Code used to indicate the conditions under which an admission occurs. Equivalent to
            Form Locator 15 Point of Origin on a UB-04 claim, not used on CMS-1500 claim forms.
        discharge_hour:
          type: integer
          description: |-
            837i Loop 2300 DTP-03
            Extension of the discharge date with hour (0-23 integer) details.
        discharge_status:
          $ref: '#/components/schemas/type_x12/v1:PatientDischargeStatusCode'
          description: |-
            837i CL1-03 or Form Locator 17 on a UB-04 claim form. This is a required field on UB-04 claims.
            Code indicating patient status as of the "statement covers through date" .
        operating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:RenderingProvider'
          description: >-
            837i NM1 2500 variant for Loop ID-2310.  Used to indicate the individual whom has primary responsibility for
            surgical procedures in institutional claims processing.
        other_operating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:RenderingProvider'
          description: >-
            837i NM1 2500 variant for Loop ID-2310.  Used to indicate the individual whom has secondary responsibility
            for surgical procedures in institutional claims processing.  Only used when operating_provider is also set.
        type_of_bill:
          $ref: '#/components/schemas/type_x12/v1:TypeOfBillCompositeUpdate'
          description: >-
            Four digit code used in institutional forms to indicate the type of bill (e.g., hospital inpatient, hospital
            outpatient). First digit is a leading 0, followed by the type_of_facility, type_of_care, then
            frequency_code. Professional forms are not required to submit this attribute. You may send the 4 digit code
            via raw_code, or each individual digit separately via composite_codes.
        accident_state_or_province_code:
          $ref: '#/components/schemas/type_commons:State'
          description: 837i-REF1000 -- an optional state indicating where an accident related to the encounter occurred.
      required:
        - external_id
        - patient_authorized_release
        - benefits_assigned_to_provider
        - provider_accepts_assignment
        - billable_status
        - patient
        - responsible_party
        - billing_provider
        - submission_expectation
      title: UniversalEncounterCreate
    type_encounters/v4:EncounterExternalIdUniquenessErrorType:
      type: object
      properties:
        external_id:
          $ref: '#/components/schemas/type_commons:EncounterExternalId'
      title: EncounterExternalIdUniquenessErrorType
    type_encounters/v4:EncounterPatientControlNumberUniquenessErrorType:
      type: object
      properties:
        patient_control_number:
          type: string
      required:
        - patient_control_number
      title: EncounterPatientControlNumberUniquenessErrorType
    type_encounters/v4:EncounterGuarantorMissingContactInfoErrorType:
      type: object
      properties:
        missing_fields:
          type: array
          items:
            type: string
      required:
        - missing_fields
      title: EncounterGuarantorMissingContactInfoErrorType
    type_encounters/v4:CashPayPayerErrorMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message
      title: CashPayPayerErrorMessage
    type_encounters/v4:InvalidTagNamesErrorType:
      type: object
      properties:
        invalid_tag_names:
          type: array
          items:
            type: string
      required:
        - invalid_tag_names
      title: InvalidTagNamesErrorType
    type_encounters/v4:PayerPlanGroupPayerDoesNotMatchInsuranceCardError:
      type: object
      properties:
        payer_plan_group_payer_uuid:
          $ref: '#/components/schemas/type_payers/v3:PayerUuid'
        insurance_card_payer_uuid:
          $ref: '#/components/schemas/type_payers/v3:PayerUuid'
      required:
        - payer_plan_group_payer_uuid
      title: PayerPlanGroupPayerDoesNotMatchInsuranceCardError
    type_encounters/v4:EncounterRenderingOrAttendingProviderRequiredError:
      type: object
      properties: {}
      title: EncounterRenderingOrAttendingProviderRequiredError
    type_diagnoses:DiagnosisCreate:
      type: object
      properties:
        name:
          type: string
          description: Empty string not allowed.
        code_type:
          $ref: '#/components/schemas/type_diagnoses:DiagnosisTypeCode'
          description: >-
            Typically, providers submitting claims to Candid are using ICD-10 diagnosis codes. If you are using ICD-10
            codes, the primary diagnosis code listed on the claim should use the ABK code_type. If more than one
            diagnosis is being submitted on a claim, please use ABF for the rest of the listed diagnoses. If you are
            using ICD-9 diagnosis codes, use BK and BF for the principal and following diagnosis code(s) respectively.
        code:
          type: string
          description: |-
            Empty string not allowed.
            Should be of the appropriate format for the provided `code_type`.
            Must obey the ICD-10 format if an ICD-10 code_type is provided, specifically:
              - Letter
              - Digit
              - Digit or the letter `A` or `B`
              - (Optional) Period `.`
              - Up to 4 (or as few as 0) letters and digits
        present_on_admission_indicator:
          $ref: '#/components/schemas/type_yes-no-indicator:YesNoIndicator'
          description: |-
            For Institutional claims only.
            A "Y" indicates that the onset occurred prior to admission to the hospital.
            An "N" indicates that the onset did NOT occur prior to admission to the hospital.
            A "U" indicates that it is unknown whether the onset occurred prior to admission to the hospital or not.
      required:
        - code_type
        - code
      title: DiagnosisCreate
    type_service-lines/v2:ServiceLineCreate:
      type: object
      properties:
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/type_commons:ProcedureModifier'
        has_epsdt_indicator:
          type: boolean
          description: |-
            Maps to SV1-11 on the 837-P and Box 24H on the CMS-1500.
            If the value is true, the box will be populated with "Y". Otherwise, the box will not be populated.
        has_family_planning_indicator:
          type: boolean
          description: |-
            Maps to SV1-12 on the 837-P and Box 24I on the CMS-1500.
            If the value is true, the box will be populated with "Y". Otherwise, the box will not be populated.
        quantity:
          $ref: '#/components/schemas/type_commons:Decimal'
          description: |-
            String representation of a Decimal that can be parsed by most libraries.
            For professional claims, a ServiceLine quantity cannot contain more than one digit of precision
            (Example: 1.1 is valid, 1.11 is not). For institutional claims, a ServiceLine quantity cannot contain
            more than three decimal digits of precision.
        units:
          $ref: '#/components/schemas/type_commons:ServiceLineUnits'
        charge_amount_cents:
          type: integer
          description: >-
            The total amount charged for this service line, factoring in quantity. If procedure_code is updated and this
            is not, the system will attempt to set it based on chargemasters entries and the service line’s quantity.
            For example, if a single unit has an entry of 100 cents and 2 units were rendered, the charge_amount_cents
            will be set to 200, if there is no chargemaster entry, it will default to the amount set in this field.
        drug_identification:
          $ref: '#/components/schemas/type_service-lines/v2:DrugIdentification'
        place_of_service_code:
          $ref: '#/components/schemas/type_commons:FacilityTypeCode'
          description: >-
            837p Loop2300, SV105. This enum is not used or required in 837i claims. If your organization does not intend
            to submit claims with a different place of service at the service line level, this field should not be
            populated. 02 for telemedicine, 11 for in-person. Full list
            [here](https://www.cms.gov/Medicare/Coding/place-of-service-codes/Place_of_Service_Code_Set).
        description:
          type: string
          description: >-
            A free-form description to clarify the related data elements and their content. Maps to SV1-01, C003-07 on a
            837-P and SV2-02, C003-07 on a 837-I form.
        date_of_service:
          type: string
          format: date
        end_date_of_service:
          type: string
          format: date
        ordering_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:OrderingProvider'
          description: >-
            Required when the service or supply was ordered by a provider who is different than the rendering provider
            for this service line.

            If not required by this implementation guide, do not send.
        test_results:
          type: array
          items:
            $ref: '#/components/schemas/type_service-lines/v2:TestResult'
          description: >-
            Contains a list of test results. Test result types may map to MEA-02 on the 837-P (ex: Hemoglobin,
            Hematocrit).

            This is unused by 837-i and ignored for institutional service lines.

            No more than 5 MEA-02 test results may be submitted per service line.
        note:
          type: string
          description: Maps to NTE02 loop 2400 on the EDI 837.
        prior_authorization_number:
          type: string
          description: >-
            Prior authorization number for this service line. Maps to the appropriate REF segment on Loop 2400 of the
            EDI 837p. This is not used for institutional claims (EDI 837i).
        external_id:
          type: string
          description: >-
            An external identifier for this service line. This is not used in the EDI 837, but can be used to identify
            the service line in external systems.

            This field should not contain PHI. Must be unique on a given claim.
        procedure_code:
          type: string
        diagnosis_pointers:
          type: array
          items:
            type: integer
          description: Indices (zero-indexed) of all the diagnoses this service line references
      required:
        - quantity
        - units
        - procedure_code
        - diagnosis_pointers
      title: ServiceLineCreate
    type_encounters/v4:EncounterCreate:
      type: object
      properties:
        external_id:
          $ref: '#/components/schemas/type_commons:EncounterExternalId'
          description: |-
            A client-specified unique ID to associate with this encounter;
            for example, your internal encounter ID or a Dr. Chrono encounter ID.
            This field should not contain PHI.
        date_of_service:
          type: string
          format: date
          description: >-
            Date formatted as YYYY-MM-DD; eg: 2019-08-24.

            This date must be the local date in the timezone where the service occurred.

            Box 24a on the CMS-1500 claim form or Form Locator 45 on the UB-04 claim form.

            If service occurred over a range of dates, this should be the start date.

            date_of_service must be defined on either the encounter or the service lines but not both.

            If there are greater than zero service lines, it is recommended to specify date_of_service on the
            service_line instead of on the encounter to prepare for future API versions.
        end_date_of_service:
          type: string
          format: date
          description: >-
            Date formatted as YYYY-MM-DD; eg: 2019-08-25.

            This date must be the local date in the timezone where the service occurred.

            If omitted, the Encounter is assumed to be for a single day.

            Must not be temporally before the date_of_service field.

            If there are greater than zero service lines, it is recommended to specify end_date_of_service on the
            service_line instead of on the encounter to prepare for future API versions.
        patient_authorized_release:
          type: boolean
          description: |-
            Whether this patient has authorized the release of medical information
            for billing purpose.
            Box 12 on the CMS-1500 claim form  or Form Locator 52 on a UB-04 claim form.
        benefits_assigned_to_provider:
          type: boolean
          description: |-
            Whether this patient has authorized insurance payments to be made to you,
            not them. If false, patient may receive reimbursement.
            Box 13 on the CMS-1500 claim form or Form Locator 53 on a UB-04 claim form.
        provider_accepts_assignment:
          type: boolean
          description: >-
            Whether you have accepted the patient's authorization for insurance payments

            to be made to you, not them.

            Box 27 on the CMS-1500 claim form. There is no exact equivalent of this field on a UB-04 claim, however
            contributes to the concept of Form Locator 53.
        appointment_type:
          type: string
          description: 'Human-readable description of the appointment type (ex: "Acupuncture - Headaches").'
        existing_medications:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:Medication'
        interventions:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:Intervention'
        pay_to_address:
          $ref: '#/components/schemas/type_commons:StreetAddressLongZip'
          description: Specifies the address to which payments for the claim should be sent.
        synchronicity:
          $ref: '#/components/schemas/type_encounters/v4:SynchronicityType'
          description: |-
            Whether or not this was a synchronous or asynchronous encounter.
            Asynchronous encounters occur when providers and patients communicate online using
            forms, instant messaging, or other pre-recorded digital mediums.
            Synchronous encounters occur in live, real-time settings where the patient interacts
            directly with the provider, such as over video or a phone call.
        vitals:
          $ref: '#/components/schemas/type_encounters/v4:Vitals'
        billable_status:
          $ref: '#/components/schemas/type_encounters/v4:BillableStatusType'
          description: |-
            Defines if the Encounter is to be billed by Candid to the responsible_party.
            Examples for when this should be set to NOT_BILLABLE include
            if the Encounter has not occurred yet or if there is no intention of ever billing the responsible_party.
        additional_information:
          type: string
          description: |-
            Defines additional information on the claim needed by the payer.
            Box 19 on the CMS-1500 claim form or Form Locator 80 on a UB-04 claim form.
        service_authorization_exception_code:
          $ref: '#/components/schemas/type_encounters/v4:ServiceAuthorizationExceptionCode'
          description: >-
            837p Loop2300 REF*4N

            Required when mandated by government law or regulation to obtain authorization for specific service(s) but,
            for the

            reasons listed in one of the enum values of ServiceAuthorizationExceptionCode, the service was performed
            without

            obtaining the authorization.
        admission_date:
          type: string
          format: date
          description: |-
            837p Loop2300 DTP*435, CMS-1500 Box 18 or UB-04 Form Locator 12.
            Required on all ambulance claims when the patient was known to be admitted to the hospital.
            OR
            Required on all claims involving inpatient medical visits.
        discharge_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*096, CMS-1500 Box 18 Required for inpatient claims when the patient was discharged from
            the facility and the discharge date is known. Not used on an institutional claim.
        onset_of_current_illness_or_symptom_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*431, CMS-1500 Box 14

            Required for the initial medical service or visit performed in response to a medical emergency when the date
            is available and is different than the date of service.

            OR

            This date is the onset of acute symptoms for the current illness or condition.
             For UB-04 claims, this is populated separately via occurrence codes.
        last_menstrual_period_date:
          type: string
          format: date
          description: >-
            837p Loop2300 DTP*484, CMS-1500 Box 14

            Required when, in the judgment of the provider, the services on this claim are related to the patient's
            pregnancy.

            This field is populated separately via occurrence codes for UB-04 claim forms.
        delay_reason_code:
          $ref: '#/components/schemas/type_commons:DelayReasonCode'
          description: |-
            Code indicating the reason why a claim submission was delayed.
            Corresponds to CLM-20 in the 837 specification (both professional and institutional).
        patient:
          $ref: '#/components/schemas/type_individual:PatientCreate'
          description: Contains the identification information of the individual receiving medical services.
        referring_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:ReferringProvider'
          description: |-
            The final provider who referred the services that were rendered.
            All physicians who order services or refer Medicare beneficiaries must
            report this data.
        initial_referring_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:InitialReferringProvider'
          description: >-
            The second iteration of Loop ID-2310 on an 837P form. Use code "P3 - Primary Care Provider" in this loop to

            indicate the initial referral from the primary care provider or whatever provider wrote the initial referral
            for this patient's episode of care being billed/reported in this transaction.

            Not used in an 837i claim
        supervising_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:SupervisingProvider'
          description: >-
            Required when the rendering provider is supervised by a physician. If not required by this implementation
            guide, do not send.
        treating_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:TreatingProvider'
          description: >-
            The treating provider is the provider who treats the patient. This is only supported for professional
            encounters.
        service_facility:
          $ref: '#/components/schemas/type_service-facility:EncounterServiceFacilityBase'
          description: >-
            Encounter Service facility is typically the location a medical service was rendered, such as a provider
            office or hospital. For telehealth, service facility can represent the provider's location when the service
            was delivered (e.g., home), or the location where an in-person visit would have taken place, whichever is
            easier to identify. If the provider is in-network, service facility may be defined in payer contracts. Box
            32 on the CMS-1500 claim form. There is no equivalent on the paper UB-04 claim form, but this field is
            equivalent to Loop 2310E Service Facility Location details on an 837i form, and is used when this is
            different to the entity identified as the Billing Provider. Note that for an in-network claim to be
            successfully adjudicated, the service facility address listed. This field is mutually exclusive with
            service_facility_id — providing both will result in a 422 error.
        service_facility_id:
          $ref: '#/components/schemas/type_organization-service-facilities/v2:OrganizationServiceFacilityId'
          description: >-
            The ID of an existing Organization Service Facility to use for this encounter. The service facility's
            canonical data (name, address, NPI, etc.) will be populated automatically. If the value does not match an
            existing Organization Service Facility, the request will fail with a 422 error. This field is mutually
            exclusive with service_facility — providing both will result in a 422 error.
        subscriber_primary:
          $ref: '#/components/schemas/type_individual:SubscriberCreate'
          description: >-
            Subscriber_primary is required when responsible_party is INSURANCE_PAY (i.e. when the claim should be billed
            to insurance).

            These are not required fields when responsible_party is SELF_PAY (i.e. when the claim should be billed to
            the patient).

            However, if you collect this for patients, even self-pay, we recommend including it when sending encounters
            to Candid.

            Note: Cash Pay is no longer a valid payer_id in v4, please use responsible party to define self-pay claims.
        subscriber_secondary:
          $ref: '#/components/schemas/type_individual:SubscriberCreate'
          description: Please always include this when you have it, even for self-pay claims.
        subscriber_tertiary:
          $ref: '#/components/schemas/type_individual:SubscriberCreate'
          description: Please always include this when you have it, even for self-pay claims.
        prior_authorization_number:
          $ref: '#/components/schemas/type_encounters/v4:PriorAuthorizationNumber'
          description: Box 23 on the CMS-1500 claim form or Form Locator 63 on a UB-04 claim form.
        responsible_party:
          $ref: '#/components/schemas/type_encounters/v4:ResponsiblePartyType'
          description: Defines the party to be billed with the initial balance owed on the claim.
        clinical_notes:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:ClinicalNoteCategoryCreate'
          description: >-
            Holds a collection of clinical observations made by healthcare providers during patient encounters. Please
            note that medical records for appeals should be sent using the Encounter Attachments API.
        billing_notes:
          type: array
          items:
            $ref: '#/components/schemas/type_billing-notes/v2:BillingNoteBase'
          description: |-
            Spot to store misc, human-readable, notes about this encounter to be used
            in the billing process.
        patient_histories:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:PatientHistoryCategory'
        guarantor:
          $ref: '#/components/schemas/type_guarantor/v1:GuarantorCreate'
          description: Personal and contact info for the guarantor of the patient responsibility.
        external_claim_submission:
          $ref: '#/components/schemas/type_claim-submission/v1:ExternalClaimSubmissionCreate'
          description: >-
            To be included for claims that have been submitted outside of Candid.

            Candid supports posting remits and payments to these claims and working them in-platform (e.g. editing,
            resubmitting).
        tag_ids:
          type: array
          items:
            $ref: '#/components/schemas/type_tags:TagId'
          description: Names of tags that should be on the encounter.
        schema_instances:
          type: array
          items:
            $ref: '#/components/schemas/type_custom-schemas/v1:SchemaInstance'
          description: |-
            Key-value pairs that must adhere to a schema created via the Custom Schema API. Multiple schema
            instances cannot be created for the same schema on an encounter.
        referral_number:
          type: string
          description: Refers to REF*9F on the 837p and 837i. Value cannot be greater than 50 characters.
        epsdt_referral:
          $ref: '#/components/schemas/type_encounters/v4:EPSDTReferral'
          description: Refers to Box 24H on the CMS1500 form and Loop 2300 CRC - EPSDT Referral on the 837P and 837i form
        claim_supplemental_information:
          type: array
          items:
            $ref: '#/components/schemas/type_encounters/v4:ClaimSupplementalInformation'
          description: Refers to Loop 2300 - Segment PWK on the 837P and 837i forms. No more than 10 entries are permitted.
        secondary_payer_carrier_code:
          type: string
          description: >-
            When Medicaid is billed as the secondary payer the Carrier Code is used to identify the primary payer. This
            is required for certain states.
        related_causes_information:
          $ref: '#/components/schemas/type_related-causes/v1:RelatedCausesInformationCreate'
          description: Corresponds to box 10a on the CMS-1500 (Loop 2300 on 837)
        property_casualty_claim_number:
          type: string
          description: 837p Loop2010 REF02, CMS1500 Box 11b
        accident_date:
          type: string
          format: date
          description: 837p Loop2300 DTP*439, CMS1500 Box 15
        property_casualty_patient_identifier:
          $ref: '#/components/schemas/type_property-and-casualty/v1:PropertyCasualtyPatientIdentifierCreate'
          description: |-
            Patient identifier for Property and Casualty claims
            837p Loop 2010CA
        billing_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:BillingProvider'
          description: >-
            The billing provider is the provider or business entity submitting the claim. Billing provider may be, but
            is not necessarily, the same person/NPI as the rendering provider. From a payer's perspective, this
            represents the person or entity being reimbursed. When a contract exists with the target payer, the billing
            provider should be the entity contracted with the payer. In some circumstances, this will be an individual
            provider. In that case, submit that provider's NPI and the tax ID (TIN) that the provider gave to the payer
            during contracting. In other cases, the billing entity will be a medical group. If so, submit the group NPI
            and the group's tax ID. Box 33 on the CMS-1500 claim form  or Form Locator 1 on a UB-04 claim form..
        diagnoses:
          type: array
          items:
            $ref: '#/components/schemas/type_diagnoses:DiagnosisCreate'
          description: |-
            Ideally, this field should contain no more than 12 diagnoses. However, more diagnoses
            may be submitted at this time, and coders will later prioritize the 12 that will be
            submitted to the payor.
        place_of_service_code:
          $ref: '#/components/schemas/type_commons:FacilityTypeCode'
          description: >-
            Box 24B on the CMS-1500 claim form. 837p Loop2300, CLM-05-1. 02 for telemedicine, 11 for in-person. Full
            list [here](https://www.cms.gov/Medicare/Coding/place-of-service-codes/Place_of_Service_Code_Set).
        rendering_provider:
          $ref: '#/components/schemas/type_encounter-providers/v2:RenderingProvider'
          description: >-
            The rendering provider is the practitioner -- physician, nurse practitioner, etc. -- performing the service.

            For telehealth services, the rendering provider performs the visit, asynchronous communication, or other
            service. The rendering provider address should generally be the same as the service facility address.
        service_lines:
          type: array
          items:
            $ref: '#/components/schemas/type_service-lines/v2:ServiceLineCreate'
          description: |-
            Each service line must be linked to a diagnosis. Concretely,
            `service_line.diagnosis_pointers`must contain at least one entry which should be
            in bounds of the diagnoses list field.
      required:
        - external_id
        - patient_authorized_release
        - benefits_assigned_to_provider
        - provider_accepts_assignment
        - billable_status
        - patient
        - responsible_party
        - billing_provider
        - diagnoses
        - place_of_service_code
        - rendering_provider
      title: EncounterCreate
