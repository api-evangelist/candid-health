      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_service-lines/v2:UniversalServiceLineCreateStandalone'
  /api/service-lines/v2/{service_line_id}/universal:
    patch:
      operationId: update-universal
