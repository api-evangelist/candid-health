          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_pre-encounter/tags/v1:Tag'
  /tags/v1:
    get:
      operationId: get-all
      summary: Get All
      description: Gets all tags. Defaults to page size of 1000.
      tags:
      - subpackage_pre-encounter.subpackage_pre-encounter/tags.subpackage_pre-encounter/tags/v1
      parameters:
      - name: limit
        in: query
        required: false
        schema:
