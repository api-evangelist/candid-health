          description: Response with status 200
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_pre-encounter/tags/v1:Tag'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_pre-encounter/tags/v1:MutableTag'
  /tags/v1/{id}/{version}:
    put:
      operationId: update
      summary: Update
      description: Updates a tag. The path must contain the most recent version to prevent races.
      tags:
      - subpackage_pre-encounter.subpackage_pre-encounter/tags.subpackage_pre-encounter/tags/v1
      parameters:
      - name: id
